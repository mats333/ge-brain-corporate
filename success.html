<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>送信完了｜株式会社Ｇ・Ｅ Ｂｒａｉｎ</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:#f8f6f1;
      color:#111519;
      font-family:"Noto Sans JP",sans-serif;
    }
    .card{
      width:min(620px,100%);
      padding:56px 36px;
      text-align:center;
      background:#fffdfa;
      border:1px solid #ded8cf;
      box-shadow:0 18px 50px rgba(35,30,22,.08);
    }
    .label{
      margin:0 0 12px;
      color:#a87924;
      letter-spacing:.28em;
      font-size:.78rem;
      font-weight:700;
    }
    h1{
      margin:0 0 20px;
      font-family:"Noto Serif JP",serif;
      font-size:clamp(1.8rem,5vw,2.7rem);
    }
    p{margin:0 0 30px;line-height:2;color:#5f625f}
    a{
      display:inline-block;
      padding:13px 26px;
      color:#fff;
      background:#07121d;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="label">THANK YOU</p>
    <h1>お問い合わせを受け付けました</h1>
    <p>内容を確認のうえ、担当者よりご連絡いたします。</p>
    <a href="/">トップページへ戻る</a>
  </main>
</body>
</html>
